<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      padding: 15px; 
      background: #f8fafc; 
      margin: 0;
    }
    .container { 
      background: white; 
      padding: 20px; 
      border-radius: 12px; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
    }
    h2 { 
      margin-top: 0; 
      color: #0f172a; 
      font-size: 1.25rem; 
      display: flex; 
      align-items: center; 
      gap: 8px;
    }
    .status-dot { 
      height: 10px; 
      width: 10px; 
      background-color: #22c55e; 
      border-radius: 50%; 
      display: inline-block; 
    }
    .stat-box {
      margin-top: 20px;
      padding: 15px;
      background: #eff6ff;
      border-radius: 8px;
      border: 1px solid #bfdbfe;
    }
    .stat-number { 
      font-size: 2.5rem; 
      font-weight: bold; 
      color: #1d4ed8; 
      margin: 0;
    }
    .stat-label { 
      color: #475569; 
      font-size: 0.875rem; 
      margin-top: 5px; 
    }
    .tag { 
      display: inline-block; 
      background: #f1f5f9; 
      color: #475569;
      padding: 4px 8px; 
      border-radius: 6px; 
      font-size: 0.75rem; 
      margin-top: 15px; 
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>SmartBlocker <span class="status-dot"></span></h2>
    <p style="color: #64748b; font-size: 0.875rem;">Heuristic Engine: <strong>Active</strong></p>
    
    <div class="stat-box">
      <p class="stat-number" id="block-count">0</p>
      <p class="stat-label">Trackers & Ads Blocked</p>
    </div>

    <div class="tag">M2 Optimized Architecture</div>
  </div>
</body>
</html>
